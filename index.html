<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>秘伝のレシピ集</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>
<body>

  <header>
    <h1>🍳 我らの秘伝レシピ集</h1>
  </header>

  <!-- 投稿フォーム（普段は非表示。＋ボタンで表示） -->
  <div id="upload-section" style="display:none;">
    <h2>新しいレシピを投稿</h2>

    <form id="recipe-form">
      <input type="text" id="author" placeholder="投稿者名" required>
      <input type="text" id="title" placeholder="料理名" required>

      <div class="input-group">
        <p>材料を追加</p>

        <!-- 材料名オートコンプリート -->
        <datalist id="ingredient-suggestions"></datalist>

        <div class="ingredient-input-box">
          <input type="text" id="temp-ingredient" placeholder="材料名" list="ingredient-suggestions">
          <input type="text" id="temp-amount-num" placeholder="量" style="width: 80px;">

          <select id="temp-unit" style="width: 120px;">
            <option value="">（なし）</option>

            <!-- 基本 -->
            <option value="g">g</option>
            <option value="kg">kg</option>
            <option value="ml">ml</option>
            <option value="L">L</option>
            <option value="cc">cc</option>

            <!-- スプーン -->
            <option value="大さじ">大さじ</option>
            <option value="小さじ">小さじ</option>

            <!-- 個数・本数 -->
            <option value="個">個</option>
            <option value="本">本</option>
            <option value="枚">枚</option>

            <!-- 料理でよく使う -->
            <option value="カップ">カップ</option>
            <option value="片">片</option>
            <option value="房">房</option>

            <!-- あいまい系（量欄が空でも使える想定） -->
            <option value="少々">少々</option>
            <option value="適量">適量</option>

            <!-- 自由入力 -->
            <option value="__other__">その他…</option>
          </select>

          <button type="button" id="add-ingredient-btn">+</button>
        </div>

        <!-- 「その他…」のときだけ出る単位入力（スマホ想定で下に表示） -->
        <div id="custom-unit-row" style="display:none; margin-top:8px;">
          <input type="text" id="temp-unit-custom" placeholder="単位を入力（例：缶、袋、パック）">
        </div>

        <!-- よく使う材料ボタン -->
        <div id="quick-ingredients">
          <button type="button" class="quick-ing" data-name="砂糖">砂糖</button>
          <button type="button" class="quick-ing" data-name="塩">塩</button>
          <button type="button" class="quick-ing" data-name="酢">酢</button>
          <button type="button" class="quick-ing" data-name="醤油">醤油</button>
          <button type="button" class="quick-ing" data-name="味噌">味噌</button>
          <button type="button" class="quick-ing" data-name="みりん">みりん</button>
          <button type="button" class="quick-ing" data-name="酒">酒</button>
          <button type="button" class="quick-ing" data-name="水">水</button>
        </div>

        <ul id="ingredient-list" class="temp-list"></ul>
      </div>

      <div class="input-group">
        <p>手順を追加</p>
        <div class="ingredient-input-box">
          <input type="text" id="temp-step" placeholder="手順">
          <button type="button" id="add-step-btn">+</button>
        </div>
        <ol id="step-list" class="temp-list"></ol>
      </div>

      <input type="text" id="point" placeholder="美味しく作るポイント！">

      <button type="submit" class="submit-btn">レシピを投稿する</button>
    </form>
  </div>

  <!-- 検索窓（フォームの下、カードの上） -->
  <div id="search-section">
    <input type="text" id="search-box" placeholder="検索：料理名 / 投稿者 / 材料 / 手順 / ポイント">
  </div>

  <!-- レシピカード一覧 -->
  <div id="container"></div>

  <!-- 右下固定：投稿ボタン -->
  <button id="floating-post-btn">＋</button>

</body>
</html>
